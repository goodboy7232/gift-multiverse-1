openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Gift Multiverse API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and user management
  - name: giftCards
    description: Gift card listings
  - name: categories
    description: Categories and subcategories
  - name: orders
    description: Buy orders
  - name: sellRequests
    description: Sell requests
  - name: blog
    description: Blog posts
  - name: dashboard
    description: Dashboard stats
  - name: wallet
    description: Wallet and transactions
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created, safe key returned once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterData"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginData"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using safe key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid safe key or username
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/profile:
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── CATEGORIES ────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: List all categories with subcategories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ── GIFT CARDS ────────────────────────────────────────────────────────────
  /gift-cards:
    get:
      operationId: getGiftCards
      tags: [giftCards]
      summary: List gift cards with filters
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: subcategoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: sort
          in: query
          schema:
            type: ["string", "null"]
            enum: [price_asc, price_desc, discount_desc, newest, null]
        - name: page
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Gift cards list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftCardListResponse"

  /gift-cards/featured:
    get:
      operationId: getFeaturedGiftCards
      tags: [giftCards]
      summary: Get featured/hot deal gift cards
      responses:
        "200":
          description: Featured gift cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GiftCard"

  /gift-cards/{id}:
    get:
      operationId: getGiftCard
      tags: [giftCards]
      summary: Get gift card by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gift card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftCard"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── ORDERS ────────────────────────────────────────────────────────────────
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a buy order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: getUserOrders
      tags: [orders]
      summary: Get current user's orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── SELL REQUESTS ─────────────────────────────────────────────────────────
  /sell-requests:
    post:
      operationId: createSellRequest
      tags: [sellRequests]
      summary: Submit a sell request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SellRequestInput"
      responses:
        "201":
          description: Sell request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellRequest"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: getUserSellRequests
      tags: [sellRequests]
      summary: Get current user's sell requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User sell requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SellRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── DASHBOARD ─────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get current user's dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── WALLET ────────────────────────────────────────────────────────────────
  /wallet/transactions:
    get:
      operationId: getWalletTransactions
      tags: [wallet]
      summary: Get wallet transactions for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── BLOG ──────────────────────────────────────────────────────────────────
  /blog:
    get:
      operationId: getBlogPosts
      tags: [blog]
      summary: List blog posts
      parameters:
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"

  /blog/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── ADMIN ─────────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders:
    get:
      operationId: adminGetOrders
      tags: [admin]
      summary: Admin list all orders
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminOrder"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}/pay:
    patch:
      operationId: adminMarkOrderPaid
      tags: [admin]
      summary: Admin mark order as paid
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPayOrderInput"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/sell-requests:
    get:
      operationId: adminGetSellRequests
      tags: [admin]
      summary: Admin list all sell requests
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: All sell requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSellRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/sell-requests/{id}/approve:
    patch:
      operationId: adminApproveSellRequest
      tags: [admin]
      summary: Admin approve a sell request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveSellInput"
      responses:
        "200":
          description: Sell request approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSellRequest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/sell-requests/{id}/reject:
    patch:
      operationId: adminRejectSellRequest
      tags: [admin]
      summary: Admin reject a sell request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectSellInput"
      responses:
        "200":
          description: Sell request rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSellRequest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/gift-cards:
    get:
      operationId: adminGetGiftCards
      tags: [admin]
      summary: Admin list all gift cards
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Gift cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GiftCard"

    post:
      operationId: adminCreateGiftCard
      tags: [admin]
      summary: Admin create gift card listing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiftCardInput"
      responses:
        "201":
          description: Gift card created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftCard"

  /admin/gift-cards/{id}:
    patch:
      operationId: adminUpdateGiftCard
      tags: [admin]
      summary: Admin update gift card
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiftCardUpdate"
      responses:
        "200":
          description: Gift card updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftCard"

    delete:
      operationId: adminDeleteGiftCard
      tags: [admin]
      summary: Admin delete gift card
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Admin list all users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/toggle:
    patch:
      operationId: adminToggleUser
      tags: [admin]
      summary: Admin enable/disable user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/blog:
    post:
      operationId: adminCreateBlogPost
      tags: [admin]
      summary: Admin create blog post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Blog post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"

  /admin/blog/{id}:
    patch:
      operationId: adminUpdateBlogPost
      tags: [admin]
      summary: Admin update blog post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostUpdate"
      responses:
        "200":
          description: Blog post updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"

    delete:
      operationId: adminDeleteBlogPost
      tags: [admin]
      summary: Admin delete blog post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ── AUTH SCHEMAS ──────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6

    RegisterData:
      type: object
      required: [token, safeKey, user]
      properties:
        token:
          type: string
        safeKey:
          type: string
          description: Safe key shown only once — user must save it
        user:
          $ref: "#/components/schemas/User"

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginData:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    ResetPasswordInput:
      type: object
      required: [username, safeKey, newPassword]
      properties:
        username:
          type: string
        safeKey:
          type: string
        newPassword:
          type: string
          minLength: 6

    ProfileUpdate:
      type: object
      properties:
        username:
          type: ["string", "null"]

    User:
      type: object
      required: [id, username, role, walletBalance, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [user, admin]
        walletBalance:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # ── CATEGORY SCHEMAS ──────────────────────────────────────────────────
    Subcategory:
      type: object
      required: [id, name, slug, categoryId]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        categoryId:
          type: integer

    Category:
      type: object
      required: [id, name, slug, subcategories]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        icon:
          type: ["string", "null"]
        subcategories:
          type: array
          items:
            $ref: "#/components/schemas/Subcategory"

    # ── GIFT CARD SCHEMAS ─────────────────────────────────────────────────
    GiftCard:
      type: object
      required: [id, brand, name, denomination, originalPrice, sellPrice, discountPct, stock, isActive, subcategoryId, createdAt]
      properties:
        id:
          type: integer
        brand:
          type: string
        name:
          type: string
        denomination:
          type: number
        originalPrice:
          type: number
        sellPrice:
          type: number
        discountPct:
          type: number
        stock:
          type: integer
        placeholderColor:
          type: ["string", "null"]
        isActive:
          type: boolean
        subcategoryId:
          type: integer
        subcategoryName:
          type: ["string", "null"]
        categoryName:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    GiftCardListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GiftCard"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    GiftCardInput:
      type: object
      required: [brand, name, denomination, originalPrice, sellPrice, discountPct, stock, subcategoryId]
      properties:
        brand:
          type: string
        name:
          type: string
        denomination:
          type: number
        originalPrice:
          type: number
        sellPrice:
          type: number
        discountPct:
          type: number
        stock:
          type: integer
        placeholderColor:
          type: ["string", "null"]
        subcategoryId:
          type: integer

    GiftCardUpdate:
      type: object
      properties:
        brand:
          type: ["string", "null"]
        name:
          type: ["string", "null"]
        denomination:
          type: ["number", "null"]
        originalPrice:
          type: ["number", "null"]
        sellPrice:
          type: ["number", "null"]
        discountPct:
          type: ["number", "null"]
        stock:
          type: ["integer", "null"]
        placeholderColor:
          type: ["string", "null"]
        isActive:
          type: ["boolean", "null"]

    # ── ORDER SCHEMAS ─────────────────────────────────────────────────────
    OrderInput:
      type: object
      required: [giftCardId, quantity]
      properties:
        giftCardId:
          type: integer
        quantity:
          type: integer
          minimum: 1

    Order:
      type: object
      required: [id, userId, giftCardId, quantity, totalPrice, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        giftCardId:
          type: integer
        giftCardName:
          type: ["string", "null"]
        giftCardBrand:
          type: ["string", "null"]
        quantity:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, processing, completed, cancelled]
        paymentMethod:
          type: ["string", "null"]
        paymentRef:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AdminOrder:
      type: object
      required: [id, userId, giftCardId, quantity, totalPrice, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        username:
          type: ["string", "null"]
        giftCardId:
          type: integer
        giftCardName:
          type: ["string", "null"]
        giftCardBrand:
          type: ["string", "null"]
        quantity:
          type: integer
        totalPrice:
          type: number
        status:
