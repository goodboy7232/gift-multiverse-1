kind = "web"
previewPath = "/"
title = "Gift Multiverse"
version = "1.0.0"
id = "artifacts/gift-multiverse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23464

[services.development]
run = "pnpm --filter @workspace/gift-multiverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gift-multiverse", "run", "build" ]
publicDir = "artifacts/gift-multiverse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23464"
BASE_PATH = "/"
